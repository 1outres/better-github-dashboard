<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Better GitHub Dashboard</title>
    <meta
      name="description"
      content="Replace GitHub's home dashboard with a fast launcher for repositories, issues, and pull requests."
    />
    <link rel="canonical" href="https://1outres.github.io/better-github-dashboard/" />
    <style>
      :root {
        color-scheme: light dark;
        --fg: #1f2328;
        --muted: #59636e;
        --bg: #ffffff;
        --accent: #0969da;
        --border: #d1d9e0;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --fg: #e6edf3;
          --muted: #9198a1;
          --bg: #0d1117;
          --accent: #4493f8;
          --border: #30363d;
        }
      }
      html,
      body {
        margin: 0;
        padding: 0;
        background: var(--bg);
        color: var(--fg);
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial,
          "Hiragino Sans", "Hiragino Kaku Gothic ProN", Meiryo, sans-serif;
        font-size: 16px;
        line-height: 1.7;
      }
      main {
        max-width: 720px;
        margin: 0 auto;
        padding: 64px 20px 96px;
      }
      h1 {
        font-size: 2rem;
        line-height: 1.25;
        margin: 0 0 8px;
      }
      .lede {
        color: var(--muted);
        font-size: 1.125rem;
        margin: 0 0 32px;
      }
      ul {
        padding-left: 1.5em;
      }
      a {
        color: var(--accent);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Better GitHub Dashboard</h1>
      <p class="lede">
        A browser extension that replaces GitHub&rsquo;s home dashboard with a
        fast launcher for repositories, issues, and pull requests.
      </p>
      <ul>
        <li>
          <a href="https://github.com/1outres/better-github-dashboard"
            >Source code &amp; install instructions</a
          >
        </li>
        <li><a href="./privacy/">Privacy Policy</a></li>
      </ul>
    </main>
  </body>
</html>
